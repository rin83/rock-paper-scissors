<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мини-планер уроков</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            margin: 5px 0;
            padding: 8px;
            border-radius: 8px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            cursor: pointer;
        }

        .lesson {
            background: #eee;
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }

        .delete {
            background: red;
            color: white;
            border: none;
            padding: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📅 Мини-планер уроков</h2>

    <input type="text" id="subject" placeholder="Предмет">
    <input type="text" id="time" placeholder="Время (например 08:00)">
    <input type="text" id="note" placeholder="Заметка">
    <input type="text" id="note" placeholder="Заметка">
         <button onclick="addLesson()">Добавить урок</button>

    <div id="list"></div>
</div>

<script>
    let lessons = [];

    function addLesson() {
        let subject = document.getElementById("subject").value;
        let time = document.getElementById("time").value;
        let note = document.getElementById("note").value;

        if (!subject || !time) {
            alert("Предмет и время обязательны");
            return;
        }

        lessons.push({ subject, time, note });
        render();

        document.getElementById("subject").value = "";
        document.getElementById("time").value = "";
        document.getElementById("note").value = "";
    }

    function deleteLesson(index) {
        lessons.splice(index, 1);
        render();
    }

    function render() {
        let list = document.getElementById("list");
        list.innerHTML = "";

        lessons.forEach((l, i) => {
            list.innerHTML += `
                <div class="lesson">
                    <div>
                        <b>${l.time}</b> | ${l.subject}<br>
                        <small>${l.note}</small>
                    </div>
                    <button class="delete" onclick="deleteLesson(${i})">X</button>
                </div>
            `;
        });
    }
</script>

</body>
</html>
